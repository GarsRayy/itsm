name: itsm_mobile
description: "ITSM Mobile — IT Service Management app for internal IT teams."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # ── Supabase SDK ──────────────────────────────
  supabase_flutter: ^2.10.0

  # ── State Management ──────────────────────────
  flutter_riverpod: ^2.6.1

  # ── Routing ───────────────────────────────────
  go_router: ^14.8.1

  # ── Typography ────────────────────────────────
  google_fonts: ^6.2.1

  # ── Animations ────────────────────────────────
  flutter_animate: ^4.5.2

  # ── UI Utilities ──────────────────────────────
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1

  # ── Data & Models ─────────────────────────────
  equatable: ^2.0.7
  intl: ^0.19.0

  # ── Platform Utilities ────────────────────────
  url_launcher: ^6.3.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
